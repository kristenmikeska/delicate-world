  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;}

  /* NAV */
  .top-nav{position:fixed;top:0;left:0;right:0;z-index:100;background:#000;border-bottom:1px solid #222;display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:54px;}
  .nav-logo{font-size:22px;font-style:italic;letter-spacing:-1px;color:#fff;}
  .nav-icons{display:flex;gap:20px;font-size:20px;cursor:pointer;}

  /* LAYOUT */
  .app{display:flex;margin-top:54px;}
  .sidebar{width:244px;padding:20px 12px;border-right:1px solid #222;position:sticky;top:54px;height:calc(100vh - 54px);overflow-y:auto;flex-shrink:0;}
  .feed{flex:1;max-width:614px;margin:0 auto;padding:20px 0;}

  /* SIDEBAR NAV */
  .s-item{display:flex;align-items:center;gap:14px;padding:10px 12px;border-radius:10px;cursor:pointer;font-size:15px;transition:background .15s;}
  .s-item:hover{background:#111;}
  .s-item.active{font-weight:700;}
  .s-avatar{width:26px;height:26px;border-radius:50%;object-fit:cover;background:#333;flex-shrink:0;}

  /* PROFILE HEADER */
  .profile-header{display:flex;align-items:flex-start;gap:32px;padding:20px 16px 30px;}
  .ph-avatar{width:94px;height:94px;border-radius:50%;object-fit:cover;background:#333;flex-shrink:0;border:3px solid #333;}
  .ph-info{flex:1;}
  .ph-username{font-size:20px;font-weight:300;letter-spacing:-.3px;margin-bottom:10px;display:flex;align-items:center;gap:10px;}
  .ph-username .verified{color:#0095f6;font-size:14px;}
  .ph-stats{display:flex;gap:28px;margin-bottom:14px;}
  .ph-stat{text-align:center;}
  .ph-stat strong{display:block;font-size:16px;font-weight:600;}
  .ph-stat span{font-size:13px;color:#999;}
  .ph-name{font-size:14px;font-weight:600;margin-bottom:4px;}
  .ph-bio{font-size:14px;color:#ddd;line-height:1.5;white-space:pre-line;}
  .ph-link{font-size:14px;color:#0095f6;margin-top:4px;}
  .private-badge{background:#111;border:1px solid #333;border-radius:6px;padding:8px 14px;font-size:13px;color:#aaa;margin-top:8px;display:inline-block;}

  /* GRID */
  .post-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;margin:0 1px;}
  .grid-item{aspect-ratio:1;overflow:hidden;cursor:pointer;position:relative;background:#111;}
  .grid-item img{width:100%;height:100%;object-fit:cover;transition:opacity .15s;}
  .grid-item:hover img{opacity:.85;}
  .grid-item .lock-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:28px;}

  /* MODAL */
  .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;align-items:center;justify-content:center;}
  .modal-bg.open{display:flex;}
  .modal{background:#000;border:1px solid #222;border-radius:4px;display:flex;max-width:900px;width:95%;max-height:90vh;overflow:hidden;}
  .modal-img{width:50%;background:#111;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .modal-img img{width:100%;height:100%;object-fit:contain;max-height:90vh;}
  .modal-right{flex:1;display:flex;flex-direction:column;overflow:hidden;}
  .modal-user{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid #222;}
  .modal-user img{width:32px;height:32px;border-radius:50%;object-fit:cover;background:#333;}
  .modal-username{font-size:14px;font-weight:600;}
  .modal-comments{flex:1;overflow-y:auto;padding:16px;}
  .modal-caption{margin-bottom:16px;font-size:14px;line-height:1.5;}
  .modal-caption strong{margin-right:6px;}
  .comment{display:flex;gap:10px;margin-bottom:14px;font-size:13px;align-items:flex-start;}
  .comment img{width:26px;height:26px;border-radius:50%;object-fit:cover;background:#333;flex-shrink:0;}
  .comment-body strong{margin-right:5px;}
  .comment-body{line-height:1.5;}
  .comment-time{color:#888;font-size:11px;margin-top:2px;}
  .modal-bottom{border-top:1px solid #222;padding:12px 16px;}
  .modal-likes{font-size:14px;font-weight:600;margin-bottom:4px;}
  .modal-date{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.5px;}
  .modal-close{position:fixed;top:20px;right:24px;font-size:28px;cursor:pointer;color:#fff;z-index:300;line-height:1;}

  /* DUALITY TOGGLE */
  .duality-bar{display:flex;border-bottom:1px solid #333;margin-bottom:0;}
  .duality-tab{flex:1;text-align:center;padding:12px;font-size:13px;cursor:pointer;color:#888;border-bottom:2px solid transparent;letter-spacing:.5px;text-transform:uppercase;}
  .duality-tab.active{color:#fff;border-bottom-color:#fff;font-weight:600;}

  /* LOCKED ACCOUNT */
  .locked-screen{text-align:center;padding:60px 20px;}
  .locked-screen .lock-icon{font-size:48px;margin-bottom:20px;}
  .locked-screen h3{font-size:18px;font-weight:400;margin-bottom:8px;}
  .locked-screen p{font-size:14px;color:#888;}

  /* HIGHLIGHT ROW */
  .highlights{display:flex;gap:16px;padding:8px 16px 20px;overflow-x:auto;}
  .hl-item{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;flex-shrink:0;}
  .hl-ring{width:58px;height:58px;border-radius:50%;background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);padding:2px;display:flex;align-items:center;justify-content:center;}
  .hl-inner{width:52px;height:52px;border-radius:50%;background:#111;border:2px solid #000;overflow:hidden;}
  .hl-inner img{width:100%;height:100%;object-fit:cover;}
  .hl-label{font-size:11px;color:#ccc;text-align:center;max-width:60px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

  /* FOLLOW BTN */
  .follow-btn{background:#0095f6;color:#fff;border:none;border-radius:6px;padding:6px 18px;font-size:14px;font-weight:600;cursor:pointer;}
  .follow-btn.private{background:#222;color:#fff;}

  /* SCROLLBAR */
  ::-webkit-scrollbar{width:6px;}
  ::-webkit-scrollbar-track{background:#000;}
  ::-webkit-scrollbar-thumb{background:#333;border-radius:3px;}
</style>
</head>

// ─── STATE ────────────────────────────────────────────────────────────────────
let currentProfile = "soomi";
let currentTab = "soomi"; // for solar duality toggle

// ─── RENDER ───────────────────────────────────────────────────────────────────
function loadProfile(key) {
  currentProfile = key;
  const p = PROFILES[key];
  const feed = document.getElementById("feed");

  let html = `
    <div class="profile-header">
      <img class="ph-avatar" src="${p.pfp}" onerror="this.style.background='#333'"/>
      <div class="ph-info">
        <div class="ph-username">
          ${p.username}
          ${p.verified ? '<span class="verified">✔</span>' : ''}
          ${!p.locked ? `<button class="follow-btn ${p.locked?'private':''}">Follow</button>` : `<button class="follow-btn private">Request</button>`}
        </div>
        <div class="ph-stats">
          <div class="ph-stat"><strong>${p.posts}</strong><span>posts</span></div>
          <div class="ph-stat"><strong>${p.followers}</strong><span>followers</span></div>
          <div class="ph-stat"><strong>${p.following}</strong><span>following</span></div>
        </div>
        <div class="ph-name">${p.name}</div>
        <div class="ph-bio">${p.bio}</div>
        ${p.link ? `<div class="ph-link">${p.link}</div>` : ''}
        ${p.locked ? `<div class="private-badge">🔒 This account is private.</div>` : ''}
      </div>
    </div>`;

  // Highlights
  if (p.highlights && p.highlights.length) {
    html += `<div class="highlights">`;
    p.highlights.forEach(h => {
      html += `<div class="hl-item">
        <div class="hl-ring"><div class="hl-inner"><img src="${h.img}" onerror="this.style.background='#555'"/></div></div>
        <span class="hl-label">${h.label}</span>
      </div>`;
    });
    html += `</div>`;
  }

  // Duality toggle for solar
  if (p.hasDuality) {
    html += `<div class="duality-bar">
      <div class="duality-tab ${currentTab==='solar'?'active':''}" onclick="switchTab('solar')">◻ Solar Lee</div>
      <div class="duality-tab ${currentTab==='soomi'?'active':''}" onclick="switchTab('soomi')">⬛ Kim Soomi</div>
    </div>`;
  }

  // Grid or locked
  if (p.locked) {
    html += `<div class="locked-screen">
      <div class="lock-icon">🔒</div>
      <h3>This account is private.</h3>
      <p>Follow ${p.username} to see their photos and videos.</p>
    </div>`;
  } else {
    const posts = key === 'solar' && currentTab === 'soomi'
      ? PROFILES.soomi.posts_data
      : p.posts_data;

    html += `<div class="post-grid">`;
    posts.forEach((post, i) => {
      html += `<div class="grid-item" onclick="openModal(${i}, '${key === 'solar' && currentTab === 'soomi' ? 'soomi_via_solar' : key}')">
        <img src="${post.img}" onerror="this.style.background='#222'"/>
      </div>`;
    });
    html += `</div>`;
  }

  feed.innerHTML = html;
}

function switchTab(tab) {
  currentTab = tab;
  loadProfile('solar');
}

// ─── MODAL ────────────────────────────────────────────────────────────────────
function openModal(index, profileKey) {
  const key = profileKey === 'soomi_via_solar' ? 'soomi' : profileKey;
  const p = PROFILES[key];
  const post = p.posts_data[index];

  document.getElementById("modalImg").src = post.img;
  document.getElementById("modalUserPfp").src = p.pfp;
  document.getElementById("modalUserName").textContent = p.username;
  document.getElementById("modalLikes").textContent = post.likes + " likes";
  document.getElementById("modalDate").textContent = post.date;

  let commentsHtml = `<div class="modal-caption"><strong>${p.username}</strong>${post.caption}</div>`;
  (post.comments || []).forEach(c => {
    commentsHtml += `<div class="comment">
      <img src="${c.pfp||''}" onerror="this.style.background='#333'"/>
      <div class="comment-body">
        <strong>${c.user}</strong>${c.text}
        ${c.time ? `<div class="comment-time">${c.time}</div>` : ''}
      </div>
    </div>`;
  });

  document.getElementById("modalComments").innerHTML = commentsHtml;
  document.getElementById("modalBg").classList.add("open");
}

function closeModal(e) {
  if (e === true || e.target === document.getElementById("modalBg")) {
    document.getElementById("modalBg").classList.remove("open");
  }
}

document.addEventListener("keydown", e => {
  if (e.key === "Escape") document.getElementById("modalBg").classList.remove("open");
});

// Load default
loadProfile("soomi");
